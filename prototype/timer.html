<!DOCTYPE html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Ethereal - Active Meditation</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-tertiary-fixed-variant": "#6d5e4f",
            "on-error": "#fff7f6",
            "background": "#fbf9f4",
            "on-tertiary": "#fff7f3",
            "on-secondary-container": "#3f555f",
            "tertiary-fixed": "#fde7d3",
            "primary-fixed": "#cbe9db",
            "surface-variant": "#e3e3db",
            "tertiary-fixed-dim": "#eed9c6",
            "tertiary-container": "#fde7d3",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#dadad2",
            "on-background": "#31332e",
            "outline": "#7a7b75",
            "secondary-fixed": "#cee6f2",
            "surface-container-high": "#e9e8e1",
            "primary-dim": "#3e594e",
            "primary": "#4a655a",
            "error-container": "#fa746f",
            "on-secondary-fixed": "#2c424c",
            "on-primary-container": "#3d574d",
            "error": "#a83836",
            "surface-container": "#efeee7",
            "tertiary-dim": "#5f5142",
            "on-error-container": "#6e0a12",
            "surface": "#fbf9f4",
            "on-tertiary-fixed": "#504234",
            "on-primary-fixed-variant": "#466156",
            "on-surface": "#31332e",
            "surface-tint": "#4a655a",
            "on-surface-variant": "#5e6059",
            "primary-container": "#cbe9db",
            "secondary-dim": "#405660",
            "on-primary-fixed": "#2a443b",
            "secondary-fixed-dim": "#c0d8e4",
            "surface-bright": "#fbf9f4",
            "surface-container-low": "#f5f4ed",
            "on-secondary": "#f2faff",
            "inverse-on-surface": "#9e9d99",
            "on-secondary-fixed-variant": "#495f69",
            "surface-container-highest": "#e3e3db",
            "on-tertiary-container": "#635445",
            "tertiary": "#6c5c4d",
            "primary-fixed-dim": "#bedbce",
            "secondary-container": "#cee6f2",
            "outline-variant": "#b2b2ab",
            "error-dim": "#67040d",
            "inverse-primary": "#d7f5e7",
            "secondary": "#4c626c",
            "inverse-surface": "#0e0e0c",
            "on-primary": "#e5fff2"
          },
          fontFamily: {
            "headline": ["Noto Serif"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .timer-ring {
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    .blur-layer {
      backdrop-filter: blur(80px);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-primary-container">
  <!-- TopAppBar Suppression Logic: This is a Task-Focused Meditating Screen, but we keep the TopAppBar for the Ethereal Brand Identity anchor as requested in the Shell logic for top-level context, however, we use the specific styles from JSON. -->
  <header
    class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#fbf9f4]/70 backdrop-blur-xl transition-colors duration-500">
    <div class="flex items-center gap-4">
      <button
        class="hover:bg-[#f5f4ed] p-2 rounded-full transition-colors duration-500 scale-95 duration-500 ease-in-out">
        <span class="material-symbols-outlined text-[#4a655a]" data-icon="menu">menu</span>
      </button>
      <span class="font-['Noto_Serif'] italic font-medium text-[#4a655a] text-lg tracking-tight">Ethereal</span>
    </div>
    <div class="flex items-center gap-2">
      <button
        class="hover:bg-[#f5f4ed] p-2 rounded-full transition-colors duration-500 scale-95 duration-500 ease-in-out">
        <span class="material-symbols-outlined text-[#4a655a]" data-icon="settings">settings</span>
      </button>
    </div>
  </header>
  <main class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
    <!-- Background: Soft-focus image layer -->
    <div class="absolute inset-0 z-0">
      <img class="w-full h-full object-cover opacity-20"
        data-alt="Soft focus ethereal close-up of a single green leaf with dew drops and dreamy morning light in a misty forest"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDXmQR9fLCzKtzEmG3sZgQpK4AiI3fmBCUQ4aqeo_RIhJcyygFYsYuWvQc1Bifwd-mUfrpk1elyyOlLMHLu2i9oYa3Xi_ldhSwr1v1hJrH3Q1eLVU-wsZeQjUIa2xm6p0jGmmB6IWyzz6J6QX2JSOgdT5Iw6C8KC4nUyoNbV6qbe4ozs0qo2oSdLNQ9NBUiaIddCIlMSvqIRCUhaQ7gUMuA1ReZy3Ctc4VPcV6p_ZlsjFBkoj3IENY7eC2nWszWrwLaGBctzMPPFY" />
      <div class="absolute inset-0 bg-gradient-to-b from-surface via-transparent to-surface"></div>
    </div>
    <!-- Active Timer Content Area -->
    <div class="relative z-10 flex flex-col items-center w-full max-w-lg px-8 text-center">
      <!-- Meditation Status Header -->
      <div class="mb-12">
        <span class="font-label text-xs uppercase tracking-[0.2rem] text-on-surface-variant opacity-60">Deep
          Presence</span>
        <h1 class="font-headline text-4xl mt-2 text-on-surface">Forest Breath</h1>
      </div>
      <!-- Central Timer & Progress Ring -->
      <div class="relative flex items-center justify-center w-80 h-80 md:w-96 md:h-96">
        <!-- Progress Ring SVG -->
        <svg class="absolute inset-0 w-full h-full timer-ring">
          <circle class="text-surface-variant opacity-20" cx="50%" cy="50%" fill="transparent" r="48%"
            stroke="currentColor" stroke-width="2"></circle>
          <circle class="text-primary" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor"
            stroke-dasharray="1000" stroke-dashoffset="350" stroke-linecap="round" stroke-width="2"></circle>
        </svg>
        <!-- Pulsating Inner Circle -->
        <div
          class="absolute w-64 h-64 md:w-80 md:h-80 rounded-full bg-gradient-to-br from-primary-container/20 to-transparent animate-pulse">
        </div>
        <!-- The Timer -->
        <div class="relative flex flex-col items-center">
          <span class="font-headline text-7xl md:text-8xl tracking-tighter text-on-surface font-light">12:45</span>
          <span class="font-label text-sm uppercase tracking-widest text-on-surface-variant mt-2">remaining</span>
        </div>
      </div>
      <!-- Ambient Sound Control Anchor -->
      <div class="absolute top-0 right-0 md:-right-16 mt-4 flex flex-col items-center gap-6">
        <button
          class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-[0_12px_32px_rgba(49,51,46,0.06)] hover:bg-surface-container transition-all">
          <span class="material-symbols-outlined text-primary" data-icon="volume_up">volume_up</span>
        </button>
      </div>
      <!-- Controls Section -->
      <div class="mt-20 flex items-center gap-12">
        <!-- Discrete Pause Button -->
        <button class="group flex flex-col items-center gap-3">
          <div
            class="w-16 h-16 rounded-full flex items-center justify-center bg-gradient-to-r from-primary to-primary-dim text-on-primary shadow-xl transition-transform duration-500 hover:scale-105 active:scale-95">
            <span class="material-symbols-outlined text-3xl" data-icon="pause"
              style="font-variation-settings: 'FILL' 1;">pause</span>
          </div>
          <span
            class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60 group-hover:opacity-100 transition-opacity">Pause</span>
        </button>
        <button class="group flex flex-col items-center gap-3">
          <div
            class="w-16 h-16 rounded-full flex items-center justify-center bg-surface-container-high text-on-surface-variant transition-transform duration-500 hover:scale-105 active:scale-95">
            <span class="material-symbols-outlined text-2xl" data-icon="stop"
              style="font-variation-settings: 'FILL' 1;">stop</span>
          </div>
          <span
            class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60 group-hover:opacity-100 transition-opacity">End
            Session</span>
        </button>
      </div>
    </div>
    <!-- Breath Indicator Bubble (Floating Task Specific Component) -->
    <div class="mt-16 flex flex-col items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-primary animate-ping"></div>
      <p class="font-label text-xs italic text-on-surface-variant/70">Inhale deeply...</p>
    </div>
  </main>
  <!-- BottomNavBar JSON implementation -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pointer-events-none">
    <div
      class="bg-[#fbf9f4]/80 backdrop-blur-2xl rounded-full mx-6 mb-8 flex justify-around items-center px-4 py-2 shadow-[0_12px_32px_rgba(49,51,46,0.06)] pointer-events-auto transition-all duration-300">
      <!-- Active Tab: Meditate -->
      <button
        class="flex flex-col items-center justify-center text-[#31332e]/60 px-5 py-2 hover:text-[#4a655a] transition-all duration-300 scale-98">
        <span class="material-symbols-outlined mb-1" data-icon="self_care">self_care</span>
        <span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05rem] font-medium">Reflect</span>
      </button>
      <button
        class="flex flex-col items-center justify-center bg-gradient-to-r from-[#4a655a] to-[#3e594e] text-[#e5fff2] rounded-full px-5 py-2 scale-98">
        <span class="material-symbols-outlined mb-1" data-icon="timer"
          style="font-variation-settings: 'FILL' 1;">timer</span>
        <span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05rem] font-medium">Meditate</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-[#31332e]/60 px-5 py-2 hover:text-[#4a655a] transition-all duration-300 scale-98">
        <span class="material-symbols-outlined mb-1" data-icon="edit_note">edit_note</span>
        <span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05rem] font-medium">Journal</span>
      </button>
    </div>
  </nav>
</body>

</html>
